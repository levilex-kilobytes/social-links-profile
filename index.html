<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Social Links Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="profile">
        <div class="profile__avatar-wrapper">
          <img
            class="profile__avatar"
            src="./assets/images/avatar-jessica.jpeg"
            alt="Jessica Randall avatar"
            width="88"
            height="88"
          />
        </div>

        <div class="profile__info">
          <h1 class="profile__name">Jessica Randall</h1>
          <p class="profile__location">London, United Kingdom</p>
          <p class="profile__bio">"Front-end developer and avid reader."</p>
        </div>

        <ul class="profile__links links">
          <li class="links__item">
            <a href="#" class="links__btn">GitHub</a>
          </li>
          <li class="links__item">
            <a href="#" class="links__btn">Frontend Mentor</a>
          </li>
          <li class="links__item">
            <a href="#" class="links__btn">LinkedIn</a>
          </li>
          <li class="links__item">
            <a href="#" class="links__btn">Twitter</a>
          </li>
          <li class="links__item">
            <a href="#" class="links__btn">Instagram</a>
          </li>
        </ul>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io" target="_blank">Frontend Mentor</a
      >. Coded by <a href="#">levi</a>.
    </footer>
  </body>
</html>
